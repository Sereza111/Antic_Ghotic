services:
  antic-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antic-backend
    restart: unless-stopped
    environment:
      PORT: "3000"

      # Подключение к твоей УЖЕ СУЩЕСТВУЮЩЕЙ MySQL на сервере
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3000:3000"
    # healthcheck можно включить позже; сейчас отключён, чтобы не требовать утилиты внутри образа.

